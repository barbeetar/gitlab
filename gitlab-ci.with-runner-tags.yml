# GitLab Pages CI example for company runners that require tags.
# To use this file, replace "your-company-runner-tag" with the runner tag used by your company,
# then rename/copy this file to .gitlab-ci.yml.

stages:
  - write
  - deploy

commit_entry:
  image: node:20-alpine
  stage: write
  tags:
    - your-company-runner-tag
  script:
    - node scripts/commit-entry-from-ci.js
  rules:
    - if: $TRIGGER_ACTION == "create_entry"

pages:
  image: node:20-alpine
  stage: deploy
  tags:
    - your-company-runner-tag
  script:
    - node scripts/build-search-index.js
    - mkdir -p public
    - cp index.html style.css app.js README.md GITLAB_DEPLOY.md public/
    - cp -r entries public/
    - if [ -d assets ]; then cp -r assets public/; fi
  pages: true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $TRIGGER_ACTION != "create_entry"
