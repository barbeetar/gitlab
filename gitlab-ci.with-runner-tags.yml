# GitLab Pages CI example for company runners that require tags.
# To use this file, replace "your-company-runner-tag" with the runner tag used by your company,
# then rename/copy this file to .gitlab-ci.yml.

stages:
  - assets
  - deploy

.runtime_before_script: &runtime_before_script
  - |
    install_runtime() {
      if command -v curl >/dev/null 2>&1 && command -v node >/dev/null 2>&1; then
        echo "curl and nodejs already available."
        return 0
      fi

      for attempt in 1 2 3; do
        echo "Installing curl nodejs from default Alpine repositories, attempt ${attempt}/3..."
        apk add --no-cache curl nodejs && return 0
        sleep 5
      done

      alpine_version="$(cut -d. -f1,2 /etc/alpine-release)"
      echo "Default Alpine CDN failed. Switching to dl-2.alpinelinux.org for Alpine v${alpine_version}."
      printf "https://dl-2.alpinelinux.org/alpine/v%s/main\nhttps://dl-2.alpinelinux.org/alpine/v%s/community\n" "$alpine_version" "$alpine_version" > /etc/apk/repositories

      for attempt in 1 2 3; do
        echo "Installing curl nodejs from fallback Alpine mirror, attempt ${attempt}/3..."
        apk update && apk add --no-cache curl nodejs && return 0
        sleep 5
      done

      echo "Failed to install curl nodejs after retrying default CDN and fallback mirror." >&2
      return 1
    }
    install_runtime

sync_issue_assets:
  stage: assets
  tags:
    - your-company-runner-tag
  before_script: *runtime_before_script
  script:
    - node scripts/sync-issue-assets.js
  artifacts:
    paths:
      - assets/issue-assets/
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  tags:
    - your-company-runner-tag
  needs:
    - job: sync_issue_assets
      artifacts: true
  before_script: *runtime_before_script
  script:
    - mkdir -p public
    - cp index.html style.css app.js README.md GITLAB_DEPLOY.md public/
    - if [ -d assets ]; then cp -r assets public/; fi
    - sh scripts/build-issues-index.sh
  pages: true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
