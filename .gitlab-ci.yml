pages:
  image: ruby:3.3
  stage: deploy
  script:
    - ruby scripts/build-search-index.rb
    - mkdir -p public
    - cp index.html style.css app.js README.md GITLAB_DEPLOY.md public/
    - cp -r entries public/
    - if [ -d assets ]; then cp -r assets public/; fi
  pages: true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
