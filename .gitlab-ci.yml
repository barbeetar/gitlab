stages:
  - assets
  - deploy

sync_issue_assets:
  stage: assets
  before_script:
    - apk add --no-cache curl nodejs
  script:
    - node scripts/sync-issue-assets.js
  artifacts:
    paths:
      - assets/issue-assets/
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  needs:
    - job: sync_issue_assets
      artifacts: true
  before_script:
    - apk add --no-cache curl nodejs
  script:
    - mkdir -p public
    - cp index.html style.css app.js README.md GITLAB_DEPLOY.md public/
    - if [ -d assets ]; then cp -r assets public/; fi
    - sh scripts/build-issues-index.sh
  pages: true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
