# GitLab Pages CI example for company runners that require tags.
# To use this file, replace "your-company-runner-tag" with the runner tag used by your company,
# then rename/copy this file to .gitlab-ci.yml.

stages:
  - write
  - index
  - assets
  - deploy

commit_entry:
  stage: write
  tags:
    - your-company-runner-tag
  before_script:
    - apk add --no-cache curl
  script:
    - sh scripts/commit-entry-from-ci.sh
  rules:
    - if: $TRIGGER_ACTION == "create_entry"

update_search_index:
  stage: index
  tags:
    - your-company-runner-tag
  before_script:
    - apk add --no-cache curl
  script:
    - sh scripts/update-search-index-from-ci.sh
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $TRIGGER_ACTION != "create_entry"

sync_issue_assets:
  stage: assets
  tags:
    - your-company-runner-tag
  before_script:
    - apk add --no-cache curl nodejs
  script:
    - node scripts/sync-issue-assets.js
  artifacts:
    paths:
      - assets/issue-assets/
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $TRIGGER_ACTION != "create_entry"

pages:
  stage: deploy
  tags:
    - your-company-runner-tag
  needs:
    - job: sync_issue_assets
      artifacts: true
  before_script:
    - apk add --no-cache curl nodejs
  script:
    - sh scripts/build-search-index.sh
    - mkdir -p public
    - cp index.html style.css app.js README.md GITLAB_DEPLOY.md public/
    - cp -r entries public/
    - if [ -d assets ]; then cp -r assets public/; fi
    - sh scripts/build-issues-index.sh
  pages: true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $TRIGGER_ACTION != "create_entry"
